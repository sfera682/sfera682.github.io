<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFERA PROM KZ — Наши работы</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="works.css">
</head>
<body>

<header class="container">
    <div class="logo">SFERA PROM KZ</div>
    <nav>
        <a href="index.html#about">О НАС</a>
        <a href="catalog.html">СТОЛЕШНИЦЫ</a>
        <a href="works.html">РАБОТЫ</a>
        <a href="index.html#contacts">КОНТАКТЫ</a>
    </nav>
    <div class="header-phone">+7 776 068 04 58</div>
</header>

<main class="container">
    <h1 class="works-title">НАШИ РАБОТЫ</h1>
    
    <div class="works-grid" id="video-grid">
        <div class="video-card">
            <blockquote class="instagram-media" data-instgrm-captioned data-instgrm-permalink="https://www.instagram.com/reel/DZZX1PyPutk/" data-instgrm-version="14">
                <a href="https://www.instagram.com/reel/DZZX1PyPutk/">Посмотреть видео</a>
            </blockquote>
        </div>
        
        </div>

    <div class="btn-container">
        <button id="load-more" class="btn-more">ПОКАЗАТЬ ЕЩЁ</button>
    </div>
</main>

<footer>
    <div class="container copyright">© 2026 SFERA PROM KZ. Все права защищены.</div>
</footer>

<script async src="//www.instagram.com/embed.js"></script>

<script>
    const grid = document.getElementById('video-grid');
    const cards = Array.from(grid.getElementsByClassName('video-card'));
    const btn = document.getElementById('load-more');
    let shownCount = 6; // Начальное количество видео

    // Скрываем всё, что больше 6
    cards.forEach((card, index) => {
        if (index >= shownCount) card.style.display = 'none';
    });

    btn.addEventListener('click', () => {
        const nextCount = shownCount + 6;
        cards.forEach((card, index) => {
            if (index < nextCount) card.style.display = 'block';
        });
        shownCount = nextCount;
        if (shownCount >= cards.length) btn.style.display = 'none';
    });
</script>

</body>
</html>
