<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
    <title>SFERA PROM KZ — Обновление кухонь</title>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>ОБНОВЛЯЕМ КУХНИ<br>С ЗАБОТОЙ О ДЕТАЛЯХ</h1>
            <p>Профессиональное обновление и реставрация кухонных гарнитуров в Павлодаре.</p>
            <button>ПОЛУЧИТЬ КОНСУЛЬТАЦИЮ</button>
        </div>
        <img src="assets/img/bg.png" class="hero-img">
    </section>

    <section class="steps">
        <h2>КАК МЫ РАБОТАЕМ</h2>
        <div class="steps-grid">
            <div class="step-card"><img src="assets/img/icon-measure.png"><h3>1. ЗАМЕР</h3><p>Точный замер и смета</p></div>
            <div class="step-card"><img src="assets/img/icon-catalog.png"><h3>2. ВЫБОР</h3><p>Подбор материалов</p></div>
            <div class="step-card"><img src="assets/img/icon-build.png"><h3>3. МОНТАЖ</h3><p>Профессиональная сборка</p></div>
            <div class="step-card"><img src="assets/img/icon-ready.png"><h3>4. РЕЗУЛЬТАТ</h3><p>Готовая кухня</p></div>
        </div>
    </section>

    <section class="banner-promo">
        <div class="banner-box">
            <img src="assets/img/work-process.jpg">
            <div>
                <h3>БЕСПЛАТНЫЙ ВЫЕЗД НА ЗАМЕР</h3>
                <button>ЗАПИСАТЬСЯ</button>
            </div>
        </div>
    </section>

</body>
</html>
